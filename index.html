<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benchmark Results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
            background: #fff;
            min-height: 100vh;
            padding: 0;
            color: #191919;
        }

        .container {
            width: 100%;
            padding: 40px 48px;
        }

        h1 {
            font-size: 1.3em;
            font-weight: 700;
            color: #191919;
            margin-bottom: 6px;
        }

        .meta {
            font-size: 0.78em;
            color: #999;
            margin-bottom: 32px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .meta a { color: #666; text-decoration: none; }
        .meta a:hover { text-decoration: underline; }

        .groups-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
        }

        .group-card {
            background: #fff;
            border: 2px solid #191919;
            border-radius: 14px;
            padding: 22px 20px 18px;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: box-shadow 0.15s;
            flex: 0 1 260px;
            min-width: 200px;
        }

        .group-card:hover {
            box-shadow: 0 4px 14px rgba(0,0,0,0.1);
        }

        .group-name {
            font-size: 0.82em;
            color: #666;
            margin-bottom: 10px;
        }

        .group-count {
            font-size: 2.6em;
            font-weight: 700;
            color: #191919;
            line-height: 1;
            margin-bottom: 4px;
        }

        .group-runs {
            font-size: 0.72em;
            color: #aaa;
            margin-bottom: 16px;
        }

        .group-updated {
            padding-top: 12px;
            border-top: 1px solid #e9e9e7;
            font-size: 0.72em;
            color: #aaa;
        }

        .no-groups {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            grid-column: 1 / -1;
        }

        footer {
            margin-top: 48px;
            font-size: 0.72em;
            color: #bbb;
        }

        footer a { color: #999; text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        @media (max-width: 700px) {
            .groups-grid { grid-template-columns: 1fr; }
            body { padding: 24px 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Benchmark Dashboard</h1>
        <div class="meta">
            <span>2026-03-07 05:07:41 MarchTC</span>
            <span>commit: <a href="https://github.com/hpsc-lab/BenchmarkExplorer.jl/commit/3f824eb2b02a3ef42586fdc5bd3f211da47b4937" target="_blank">3f824eb</a></span>
            <span><a href="https://github.com/hpsc-lab/BenchmarkExplorer.jl" target="_blank">GitHub</a></span>
        </div>

        <div class="groups-grid">
                <a href="enzyme.html" class="group-card">
                    <div class="group-name">enzyme</div>
                    <div class="group-count">7</div>
                    <div class="group-runs">62 runs</div>
                    <div class="group-updated">2026-03-07</div>
                </a>
                <a href="nanosoldier.html" class="group-card">
                    <div class="group-name">nanosoldier</div>
                    <div class="group-count">1019</div>
                    <div class="group-runs">29 runs</div>
                    <div class="group-updated">2026-03-07</div>
                </a>
                <a href="trixi.html" class="group-card">
                    <div class="group-name">trixi</div>
                    <div class="group-count">24</div>
                    <div class="group-runs">65 runs</div>
                    <div class="group-updated">2026-03-07</div>
                </a>
        </div>

        <footer>
            <p>Powered by <a href="https://github.com/hpsc-lab/BenchmarkExplorer.jl" target="_blank">BenchmarkExplorer.jl</a></p>
        </footer>
    </div>
</body>
</html>
