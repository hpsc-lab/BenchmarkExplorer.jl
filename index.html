<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benchmark Results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
            background: #fff;
            min-height: 100vh;
            color: #191919;
            transition: background 0.2s, color 0.2s;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 48px 32px;
            text-align: center;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            padding: 12px 24px;
            border-bottom: 1px solid #e9e9e7;
        }

        .btn-dark {
            background: #fff;
            border: 2px solid #191919;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 0.8em;
            font-family: inherit;
            cursor: pointer;
            font-weight: 600;
            color: #191919;
            transition: background 0.15s;
        }

        .btn-dark:hover { background: #f7f6f3; }
        .btn-dark.active { background: #191919; color: #fff; }

        h1 {
            font-size: 1.4em;
            font-weight: 700;
            color: #191919;
            margin-bottom: 8px;
        }

        .meta {
            font-size: 0.78em;
            color: #999;
            margin-bottom: 40px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .meta a { color: #666; text-decoration: none; }
        .meta a:hover { text-decoration: underline; }

        .groups-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-bottom: 48px;
        }

        .group-card {
            background: #fff;
            border: 2px solid #191919;
            border-radius: 14px;
            padding: 22px 20px 18px;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: box-shadow 0.15s, transform 0.15s;
            flex: 0 1 240px;
            min-width: 180px;
            text-align: left;
        }

        .group-card:hover {
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .group-name {
            font-size: 0.82em;
            color: #666;
            margin-bottom: 10px;
        }

        .group-count {
            font-size: 2.6em;
            font-weight: 700;
            color: #191919;
            line-height: 1;
            margin-bottom: 4px;
        }

        .group-runs {
            font-size: 0.72em;
            color: #aaa;
            margin-bottom: 16px;
        }

        .group-trend { font-size: 0.85em; font-weight: 700; margin-bottom: 8px; }

        .group-updated {
            padding-top: 12px;
            border-top: 1px solid #e9e9e7;
            font-size: 0.72em;
            color: #aaa;
        }

        .no-groups {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        footer {
            font-size: 0.72em;
            color: #bbb;
        }

        footer a { color: #999; text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        body.dark-mode { background: #191919; color: #e9e9e7; }
        body.dark-mode .top-bar { border-bottom-color: #333; }
        body.dark-mode .btn-dark { background: #252525; color: #e9e9e7; border-color: #555; }
        body.dark-mode .btn-dark:hover { background: #333; }
        body.dark-mode .btn-dark.active { background: #e9e9e7; color: #191919; border-color: #e9e9e7; }
        body.dark-mode h1 { color: #e9e9e7; }
        body.dark-mode .meta a { color: #aaa; }
        body.dark-mode .group-card { background: #252525; border-color: #383838; color: #e9e9e7; }
        body.dark-mode .group-card:hover { box-shadow: 0 6px 18px rgba(0,0,0,0.4); border-color: #666; }
        body.dark-mode .group-name { color: #aaa; }
        body.dark-mode .group-count { color: #e9e9e7; }
        body.dark-mode .group-updated { border-top-color: #333; }
        body.dark-mode footer a { color: #666; }
        #search { border: 2px solid #191919; }
        body.dark-mode #search { background: #252525; color: #e9e9e7; border-color: #e9e9e7; }

        @media (max-width: 600px) {
            .container { padding: 32px 16px; }
            .group-card { flex: 0 1 100%; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <button class="btn-dark" id="btn-dark">Dark</button>
    </div>
    <div class="container">
        <h1>Benchmark Dashboard</h1>
        <div class="meta">
            <span>2026-03-25 03:08:31 UTC</span>
            <span>commit: <a href="https://github.com/hpsc-lab/BenchmarkExplorer.jl/commit/64806548cface7075648124ee6c57c4af35a20fc" target="_blank">6480654</a></span>
            <span><a href="https://github.com/hpsc-lab/BenchmarkExplorer.jl" target="_blank">GitHub</a></span>
        </div>

        <input type="text" id="search" placeholder="Search groups..." style="display:block;width:100%;max-width:400px;margin:0 auto 24px;padding:10px 16px;border-radius:8px;font-family:inherit;font-size:0.85em;outline:none;box-sizing:border-box;background:inherit;color:inherit;">
        <div class="groups-grid" id="groups-grid">
                <a href="enzyme.html" class="group-card">
                    <div class="group-name">enzyme</div>
                    <div class="group-count">7</div>
                    <div class="group-runs">64 runs</div>
                    
                    <div class="group-updated">2026-03-22</div>
                </a>
                <a href="nanosoldier.html" class="group-card">
                    <div class="group-name">nanosoldier</div>
                    <div class="group-count">4062</div>
                    <div class="group-runs">214 runs</div>
                    
                    <div class="group-updated">2026-03-12</div>
                </a>
                <a href="trixi.html" class="group-card">
                    <div class="group-name">trixi</div>
                    <div class="group-count">24</div>
                    <div class="group-runs">66 runs</div>
                    
                    <div class="group-updated">2026-03-22</div>
                </a>
        </div>

        <footer>
            <p>Powered by <a href="https://github.com/hpsc-lab/BenchmarkExplorer.jl" target="_blank">BenchmarkExplorer.jl</a></p>
            <p style="margin-top:6px;">hpsc lab</p>
        </footer>
    </div>
    <script>
        const btn = document.getElementById('btn-dark');
        function applyDark(on) {
            document.body.classList.toggle('dark-mode', on);
            btn.classList.toggle('active', on);
        }
        applyDark(localStorage.getItem('darkMode') === 'true');
        btn.addEventListener('click', function() {
            const on = !document.body.classList.contains('dark-mode');
            applyDark(on);
            localStorage.setItem('darkMode', on);
        });
        const searchEl = document.getElementById('search');
        searchEl.addEventListener('input', function() {
            const q = this.value.toLowerCase();
            document.querySelectorAll('.group-card').forEach(card => {
                card.style.display = card.querySelector('.group-name').textContent.toLowerCase().includes(q) ? '' : 'none';
            });
        });
    </script>
</body>
</html>
