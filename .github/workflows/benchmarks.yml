name: Run Benchmarks

on:
  schedule:
    - cron: '0 2 * * *'

  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'ci/**'
      - 'scripts/**'
      - 'Project.toml'
      - 'action.yml'
      - '.github/workflows/benchmarks.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'ci/**'
      - 'scripts/**'
      - 'Project.toml'
      - 'action.yml'
      - '.github/workflows/benchmarks.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: benchmarks
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if benchmarks needed
        id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          git fetch origin gh-pages || true
          LAST_HASH=$(git show origin/gh-pages:latest_100.json 2>/dev/null | grep -o '"commit_hash"[[:space:]]*:[[:space:]]*"[^"]*"' | head -1 | grep -o '"[^"]*"$' | tr -d '"' || echo "")

          if [ -z "$LAST_HASH" ]; then
            echo "No previous benchmark found, running"
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif git merge-base --is-ancestor $LAST_HASH HEAD 2>/dev/null && [ "$LAST_HASH" != "${{ github.sha }}" ]; then
            echo "New commits since last benchmark ($LAST_HASH), running"
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$LAST_HASH" = "${{ github.sha }}" ]; then
            echo "No changes since last benchmark, skipping"
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "Running benchmarks"
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  benchmark-trixi:
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.should_run == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run BenchmarkExplorer
        uses: ./
        with:
          data_dir: 'data'
          group_name: 'trixi'
          julia_version: '1.11'
          persist_to_branch: ''
          github_token: ${{ secrets.GITHUB_TOKEN }}

  benchmark-enzyme:
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.should_run == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run BenchmarkExplorer
        uses: ./
        with:
          data_dir: 'data'
          group_name: 'enzyme'
          julia_version: '1.11'
          persist_to_branch: ''
          github_token: ${{ secrets.GITHUB_TOKEN }}

  benchmark-nanosoldier:
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.should_run == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run BenchmarkExplorer
        uses: ./
        with:
          data_dir: 'data'
          group_name: 'nanosoldier'
          julia_version: '1.11'
          persist_to_branch: ''
          commit_base_url: 'https://github.com/JuliaLang/julia'
          github_token: ${{ secrets.GITHUB_TOKEN }}

  update-index:
    runs-on: ubuntu-latest
    needs: [check-changes, benchmark-trixi, benchmark-enzyme, benchmark-nanosoldier]
    if: always() && needs.check-changes.outputs.should_run == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'

      - name: Cache Julia packages
        uses: actions/cache@v5
        with:
          path: ~/.julia
          key: julia-${{ runner.os }}-${{ hashFiles('ci/Project.toml', 'ci/Manifest.toml') }}
          restore-keys: julia-${{ runner.os }}-

      - name: Download benchmark artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: benchmark-data-*
          merge-multiple: true
          path: data

      - name: Fetch existing data from gh-pages
        run: |
          git fetch origin gh-pages || true
          mkdir -p data
          git archive origin/gh-pages -- by_group 2>/dev/null | tar -x -C data || true
          git archive origin/gh-pages -- nanosoldier_raw 2>/dev/null | tar -x -C data || true

      - name: Rebuild and publish
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGRESSION_THRESHOLD: '1.05'
          HEATMAP_COMMITS: '25'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          julia --project=ci -e 'using Pkg; Pkg.Registry.add("General"); Pkg.instantiate()'

          DATA_HASH=$(find data/by_group -name "*.json" 2>/dev/null | sort | xargs sha256sum 2>/dev/null | sha256sum | cut -d' ' -f1 || echo "")
          PREV_HASH=$(git show origin/gh-pages:data_hash.txt 2>/dev/null || echo "")
          if [ "$DATA_HASH" = "$PREV_HASH" ] && [ -n "$DATA_HASH" ]; then
            echo "Data unchanged, skipping HTML generation"
            echo "SKIP_HTML=true" >> $GITHUB_ENV
          else
            echo "$DATA_HASH" > /tmp/data_hash.txt
            echo "SKIP_HTML=false" >> $GITHUB_ENV
          fi

          julia --project=ci ci/rebuild_data.jl data
          julia --project=ci ci/generate_index_page.jl data /tmp/index.html \
            "${{ github.server_url }}/${{ github.repository }}" "${{ github.sha }}"

          mkdir -p /tmp/benchmark_html
          if [ "$SKIP_HTML" = "true" ]; then
            echo "Skipping HTML generation"
          else
          julia --project=ci -e '
            include(ARGS[1])
            using JSON
            repo_url = ARGS[4]
            commit_sha = ARGS[5]
            ns_url = ARGS[6]
            latest = JSON.parsefile(joinpath(ARGS[2], "latest_100.json"))
            for group in keys(get(latest, "groups", Dict()))
              println("Generating page for: ", group)
              commit_base = startswith(group, "nanosoldier") || startswith(group, "ns") ? ns_url : repo_url
              generate_static_page_plotly(ARGS[2], joinpath(ARGS[3], group * ".html"), group, repo_url, commit_sha, commit_base)
            end
          ' -- ci/generate_static_page_plotly.jl data /tmp/benchmark_html \
            "${{ github.server_url }}/${{ github.repository }}" "${{ github.sha }}" \
            "https://github.com/JuliaLang/julia"
          fi

          rm -rf data
          git fetch origin gh-pages
          git checkout gh-pages

          cp -r data/index.json data/latest_100.json .
          cp /tmp/index.html index.html
          cp /tmp/benchmark_html/*.html . 2>/dev/null || true
          cp /tmp/benchmark_html/*-badge.svg . 2>/dev/null || true
          cp /tmp/benchmark_html/*-grafana.json . 2>/dev/null || true
          cp /tmp/benchmark_html/*-alerts.json . 2>/dev/null || true
          cp /tmp/data_hash.txt data_hash.txt 2>/dev/null || true

          git add -A
          git commit -m "Rebuild data and update pages" && git push origin gh-pages || echo "No changes, skipping push"

          git checkout -f ${{ github.sha }}

      - name: Trigger pages deployment
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml

      - name: Comment on PR with regression summary
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REG_COUNT=$(julia --project=ci -e '
            using JSON
            data = isfile("data/latest_100.json") ? JSON.parsefile("data/latest_100.json") : Dict()
            total = 0
            for (g, gdata) in get(data, "groups", Dict())
              for (_, bench) in get(gdata, "benchmarks", Dict())
                r = get(bench, "time_ratio", 0.0)
                r > 1.05 && (total += 1)
              end
            end
            println(total)
          ' 2>/dev/null || echo "0")

          BODY="### Benchmark Results

          **Regressions (ratio > 1.05):** ${REG_COUNT}

          [View full results](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/) · Generated by BenchmarkExplorer.jl"

          gh pr comment ${{ github.event.pull_request.number }} --body "$BODY" \
            --repo ${{ github.repository }} 2>/dev/null || true
