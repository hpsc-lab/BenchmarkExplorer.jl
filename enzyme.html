    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>enzyme - BenchmarkExplorer</title>
        <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
                background: #fff;
                min-height: 100vh;
                padding: 0;
                color: #191919;
            }

            .container {
                width: 100%;
                background: #fff;
            }

            header {
                background: #fff;
                color: #191919;
                padding: 28px 32px 20px;
            }

            header h1 {
                font-size: 1.4em;
                font-weight: 700;
                margin-bottom: 4px;
            }

            header p {
                font-size: 0.8em;
                color: #999;
            }

            .stats-panel {
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
                padding: 16px 32px;
                background: #fff;
            }

            .stat-card {
                background: #fff;
                border: 2px solid #191919;
                border-radius: 10px;
                padding: 12px 20px;
                text-align: center;
                flex: 1 1 130px;
            }

            .stat-card .value {
                font-size: 2em;
                font-weight: 700;
                color: #191919;
                margin-bottom: 6px;
            }

            .stat-card .label {
                color: #787774;
                font-size: 0.8em;
                text-transform: uppercase;
                letter-spacing: 0.8px;
            }

            .controls {
                padding: 12px 32px;
                background: #fff;
                border-bottom: 2px solid #191919;
                position: sticky;
                top: 0;
                z-index: 100;
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                align-items: center;
            }

            .btn {
                padding: 8px 16px;
                border: 2px solid #191919;
                border-radius: 8px;
                font-size: 0.85em;
                cursor: pointer;
                font-weight: 500;
                background: #fff;
                color: #191919;
                transition: background 0.15s;
            }

            .btn:hover {
                background: #f7f6f3;
            }

            .btn-primary {
                background: #191919;
                color: #fff;
                border-color: #191919;
            }

            .btn-primary:hover {
                background: #333;
                border-color: #333;
            }

            .btn.active {
                background: #191919;
                color: #fff;
                border-color: #191919;
            }

            .search-box {
                flex: 1;
                min-width: 260px;
                padding: 8px 14px;
                border: 2px solid #191919;
                border-radius: 8px;
                font-size: 0.9em;
                background: #fff;
                color: #191919;
            }

            .search-box:focus {
                outline: none;
                border-color: #191919;
            }

            .benchmarks {
                padding: 24px 32px;
                background: #fff;
            }

            .benchmark-item {
                border: 2px solid #191919;
                border-radius: 10px;
                margin-bottom: 32px;
                overflow: hidden;
                transition: transform 0.15s ease, box-shadow 0.15s ease;
                animation: fadeSlideIn 0.25s ease both;
            }

            @keyframes fadeSlideIn {
                from { opacity: 0; transform: translateY(8px); }
                to   { opacity: 1; transform: translateY(0); }
            }

            .benchmark-item:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(0,0,0,0.12);
            }

            .benchmark-header {
                background: #f7f6f3;
                padding: 16px 20px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                gap: 12px;
                border-bottom: 1px solid #e9e9e7;
            }

            .benchmark-name {
                font-size: 1em;
                font-weight: 600;
                color: #191919;
                font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .trend-badge {
                padding: 3px 8px;
                border-radius: 3px;
                font-size: 0.75em;
                font-weight: 600;
                font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            }

            .trend-faster {
                background: #e6f4ea;
                color: #1e7e34;
                border: 1px solid #c3e6cb;
            }

            .trend-slower {
                background: #fce8e8;
                color: #b91c1c;
                border: 1px solid #f5c6cb;
            }

            .trend-stable {
                background: #f7f6f3;
                color: #787774;
                border: 1px solid #e9e9e7;
            }

            .benchmark-stats {
                display: flex;
                gap: 24px;
                flex-wrap: wrap;
            }

            .stat {
                text-align: center;
            }

            .stat-key {
                display: block;
                font-size: 0.72em;
                color: #787774;
                margin-bottom: 3px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .stat-val {
                display: block;
                font-weight: 600;
                color: #191919;
                font-size: 0.95em;
            }

            .plot-container {
                width: 100%;
                min-height: 500px;
                background: #fff;
                padding-top: 16px;
                padding-bottom: 16px;
            }

            .benchmark-item.trend-faster { border-left: 5px solid #27ae60; }
            .benchmark-item.trend-slower { border-left: 5px solid #e74c3c; }
            .benchmark-item.trend-stable { border-left: 5px solid #ccc; }

            .skeleton-chart {
                padding: 20px;
                height: 350px;
                display: flex;
                flex-direction: column;
                gap: 8px;
                justify-content: flex-end;
            }

            .skeleton-bar {
                background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
                background-size: 200% 100%;
                animation: shimmer 1.4s infinite;
                border-radius: 3px;
            }

            @keyframes shimmer {
                0%   { background-position: 200% 0; }
                100% { background-position: -200% 0; }
            }

            .anchor-btn {
                background: none;
                border: none;
                cursor: pointer;
                font-size: 0.8em;
                color: #ccc;
                padding: 2px 4px;
                opacity: 0;
                transition: opacity 0.15s;
            }

            .benchmark-header:hover .anchor-btn { opacity: 1; }

            .sparkline-svg { vertical-align: middle; margin-left: 8px; }

            .tree-children {
                overflow: hidden;
                max-height: 0;
                transition: max-height 0.35s ease;
            }

            .tree-children.open {
                max-height: 999999px;
                transition: max-height 0.5s ease;
            }

            footer {
                background: #fff;
                color: #bbb;
                text-align: center;
                padding: 16px;
                font-size: 0.75em;
                border-top: 1px solid #e9e9e7;
            }

            footer a {
                color: #999;
                text-decoration: none;
            }

            footer a:hover {
                text-decoration: underline;
            }

            .no-results {
                text-align: center;
                padding: 60px;
                color: #787774;
            }

            .no-results h2 {
                margin-bottom: 10px;
                color: #191919;
            }

            .tree-node {
                margin-left: 0;
            }

            .tree-node.root {
                margin-left: 0;
            }

            .tree-toggle {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 16px 24px;
                margin: 4px 0;
                background: #fafafa;
                border: 2px solid #191919;
                border-radius: 8px;
                cursor: pointer;
                font-weight: 700;
                font-size: 1em;
                color: #191919;
                user-select: none;
                width: 100%;
            }

            .tree-toggle:hover {
                background: #f5f5f5;
            }

            .toggle-icon {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 22px;
                height: 22px;
                border: 1.5px solid #191919;
                border-radius: 5px;
                font-size: 1em;
                font-weight: 700;
                flex-shrink: 0;
            }

            .tree-toggle .count {
                font-size: 0.75em;
                color: #999;
                font-weight: 400;
                margin-left: auto;
            }

            body.dark-mode {
                background: #2a2a2a;
                color: #e9e9e7;
            }

            body.dark-mode .container {
                background: #333;
                border-color: #484848;
            }

            body.dark-mode header {
                background: #333;
                border-bottom-color: #484848;
            }

            body.dark-mode header h1 { color: #fff; }
            body.dark-mode header p { color: #aaa; }

            body.dark-mode footer {
                background: #2a2a2a;
                color: #888;
                border-top-color: #444;
            }

            body.dark-mode footer a { color: #aaa; }

            body.dark-mode .stats-panel {
                background: #2a2a2a;
                border-bottom-color: #484848;
            }

            body.dark-mode .stat-card {
                background: #333;
                border-right-color: #484848;
                color: #e9e9e7;
            }

            body.dark-mode .stat-card .value {
                color: #e9e9e7;
            }

            body.dark-mode .controls {
                background: #333;
                border-bottom-color: #484848;
            }

            body.dark-mode .btn {
                background: #333;
                color: #e9e9e7;
                border-color: #484848;
            }

            body.dark-mode .btn:hover {
                background: #404040;
            }

            body.dark-mode .btn-primary, body.dark-mode .btn.active {
                background: #e9e9e7;
                color: #191919;
                border-color: #e9e9e7;
            }

            body.dark-mode .search-box {
                background: #333;
                color: #fff;
                border-color: #484848;
            }

            body.dark-mode .search-box:focus {
                border-color: #e9e9e7;
            }

            body.dark-mode .benchmarks {
                background: #333;
            }

            body.dark-mode .benchmark-item {
                border-color: #484848;
            }

            body.dark-mode .benchmark-item:hover {
                border-color: #e9e9e7;
            }

            body.dark-mode .benchmark-header {
                background: #2a2a2a;
                border-bottom-color: #484848;
            }

            body.dark-mode .benchmark-name {
                color: #e9e9e7;
            }

            body.dark-mode .stat-val {
                color: #e9e9e7;
            }

            body.dark-mode .plot-container {
                background: #333;
            }

            body.dark-mode .tree-toggle {
                background: #2a2a2a;
                border-color: #484848;
                color: #e9e9e7;
            }

            body.dark-mode .tree-toggle:hover {
                background: #383838;
            }

            body.dark-mode .toggle-icon {
                border-color: #e9e9e7;
            }

            body.dark-mode .tree-toggle .count {
                color: #666;
            }

            body.compact-mode .plot-container { display: none !important; }
            body.compact-mode .benchmark-item { margin-bottom: 6px; }
            body.compact-mode .benchmark-header { border-bottom: none; padding: 10px 16px; cursor: pointer; }
            body.compact-mode .benchmark-stats { display: none; }
            body.compact-mode .sparkline-svg { width: 120px !important; height: 36px !important; }

            #render-progress-wrap {
                position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: #e9e9e7;
            }
            #render-progress-bar {
                height: 100%; background: #191919; width: 0;
                transition: width 0.3s ease, opacity 0.4s ease;
            }

            .heatmap-wrap { overflow-x: auto; padding: 24px 32px 32px; display: flex; justify-content: center; }
            .heatmap-table { border-collapse: separate; border-spacing: 2px; font-size: 0.72em; white-space: nowrap; }
            .heatmap-table th { padding: 4px 8px; font-weight: 600; border-bottom: 2px solid #191919; font-size: 0.9em; color: #555; }
            .heatmap-table td { height: 28px; min-width: 38px; text-align: center; font-size: 0.85em; transition: opacity 0.15s; border-radius: 3px; }
            .heatmap-table tr:hover td { opacity: 0.8; }
            .heatmap-name { padding: 4px 14px 4px 4px !important; text-align: left !important; max-width: 280px; overflow: hidden; text-overflow: ellipsis; font-family: monospace; font-size: 0.95em; }

            .comparison-panel { padding: 0 32px 24px; }
            .comparison-table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
            .comparison-table th { padding: 8px 12px; text-align: left; border-bottom: 2px solid #191919; font-size: 0.8em; text-transform: uppercase; letter-spacing: 0.5px; }
            .comparison-table td { padding: 7px 12px; border-bottom: 1px solid #e9e9e7; }
            .comparison-table tbody tr:hover { background: #f7f6f3; }

            .shortcuts-modal {
                display: none; position: fixed; inset: 0;
                background: rgba(0,0,0,0.35); z-index: 10000;
                align-items: center; justify-content: center;
            }
            .shortcuts-modal.open { display: flex; }
            .shortcuts-box {
                background: #fff; border: 2px solid #191919; border-radius: 14px;
                padding: 28px 32px; min-width: 320px;
                font-family: 'JetBrains Mono', monospace;
            }
            .shortcuts-box h3 { margin-bottom: 18px; font-size: 1em; }
            .shortcut-row {
                display: flex; justify-content: space-between; align-items: center;
                gap: 24px; padding: 7px 0; border-bottom: 1px solid #e9e9e7; font-size: 0.82em;
            }
            .shortcut-row:last-of-type { border-bottom: none; }
            kbd {
                background: #f7f6f3; border: 1px solid #ccc; border-radius: 4px;
                padding: 2px 7px; font-family: inherit; font-size: 0.9em;
            }

            mark.hl { background: #fff176; color: inherit; border-radius: 2px; padding: 0 1px; }

            body.dark-mode .shortcuts-box { background: #333; border-color: #484848; color: #e9e9e7; }
            body.dark-mode .shortcut-row { border-bottom-color: #484848; }
            body.dark-mode kbd { background: #2a2a2a; border-color: #555; color: #e9e9e7; }
            body.dark-mode mark.hl { background: #856a00; color: #fff; }
            body.dark-mode .stat-key { color: #888; }
            body.dark-mode .trend-faster { background: #0d2b14; color: #5cc475; border-color: #1e5c2e; }
            body.dark-mode .trend-slower { background: #2b0d0d; color: #f07070; border-color: #5c1e1e; }
            body.dark-mode .benchmark-item.trend-faster { border-left-color: #2ecc71; }
            body.dark-mode .benchmark-item.trend-slower { border-left-color: #e74c3c; }
            body.dark-mode .benchmark-item.trend-stable { border-left-color: #555; }
            body.dark-mode .skeleton-bar { background: linear-gradient(90deg, #333 25%, #3a3a3a 50%, #333 75%); }
            body.dark-mode .comparison-table { color: #e9e9e7; }
            body.dark-mode .comparison-table th { border-bottom-color: #444; color: #aaa; }
            body.dark-mode .comparison-table td { border-bottom-color: #333; }
            body.dark-mode .comparison-table tbody tr:hover { background: #2a2a2a; }
            body.dark-mode .heatmap-table { color: #e9e9e7; }
            body.dark-mode .heatmap-table th { border-bottom-color: #444; color: #aaa; }
            body.dark-mode .heatmap-table td { color: #e9e9e7; }
            body.dark-mode .heatmap-name { color: #e9e9e7; }
            body.dark-mode .no-results { color: #aaa; }
            .subcat-pill { font-size:0.75em;padding:4px 10px;border:1px solid #ccc;border-radius:6px;text-decoration:none;color:#555; }
            .subcat-pill:hover { border-color:#999;color:#191919; }
            body.dark-mode .subcat-pill { border-color:#555;color:#aaa; }
            body.dark-mode .subcat-pill:hover { border-color:#aaa;color:#e9e9e7; }
            body.dark-mode .anchor-btn { background: #333; border-color: #555; color: #aaa; }
            body.dark-mode .anchor-btn:hover { background: #444; color: #e9e9e7; }
            body.dark-mode #render-progress-wrap { background: #333; }
            body.dark-mode #render-progress-bar { background: #e9e9e7; }
            body.dark-mode #loading-overlay { background: #2a2a2a; color: #e9e9e7; }

            @media (max-width: 768px) {
                .benchmarks { padding: 16px; }
                .benchmark-header { padding: 12px 16px; flex-direction: column; align-items: flex-start; }
                .benchmark-stats { gap: 12px; flex-wrap: wrap; }
                .controls { padding: 10px 12px; gap: 6px; }
                header { padding: 20px 16px; }
                .heatmap-wrap { padding: 16px; }
                .comparison-panel { padding: 0 16px 16px; }
            }

            #loading-overlay {
                position: fixed;
                inset: 0;
                background: #fff;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 9999;
                gap: 20px;
            }

            #loading-overlay.hidden { display: none; }

            .nyan-scene {
                display: flex;
                align-items: center;
                animation: nyan-fly 0.35s ease-in-out infinite alternate;
            }

            @keyframes nyan-fly {
                from { transform: translateY(-6px); }
                to   { transform: translateY(6px);  }
            }

            .nyan-rainbow {
                display: flex;
                flex-direction: column;
                gap: 2px;
                margin-right: 0;
            }

            .nyan-rainbow span {
                display: block;
                height: 7px;
                border-radius: 3px 0 0 3px;
                animation: rainbow-grow 0.8s ease-in-out infinite alternate;
            }

            @keyframes rainbow-grow {
                from { width: 60px; opacity: 0.7; }
                to   { width: 100px; opacity: 1;  }
            }

            .nyan-rainbow span:nth-child(1) { background: #ff0000; animation-delay: 0s; }
            .nyan-rainbow span:nth-child(2) { background: #ff7f00; animation-delay: 0.05s; }
            .nyan-rainbow span:nth-child(3) { background: #ffff00; animation-delay: 0.10s; }
            .nyan-rainbow span:nth-child(4) { background: #00cc00; animation-delay: 0.15s; }
            .nyan-rainbow span:nth-child(5) { background: #0066ff; animation-delay: 0.20s; }
            .nyan-rainbow span:nth-child(6) { background: #9900cc; animation-delay: 0.25s; }

            .nyan-body {
                background: #e8c9a0;
                border: 2px solid #191919;
                border-radius: 8px;
                padding: 6px 10px;
                position: relative;
                font-family: monospace;
                line-height: 1.2;
                font-size: 0.78em;
                white-space: pre;
            }

            .nyan-head {
                font-size: 1.8em;
                margin-left: -4px;
            }

            .nyan-stars {
                position: absolute;
                font-size: 1.1em;
                animation: star-twinkle 0.6s ease-in-out infinite alternate;
            }
            .nyan-stars.s1 { top: -18px; right: -30px; animation-delay: 0s; }
            .nyan-stars.s2 { bottom: -18px; right: -50px; animation-delay: 0.3s; }
            .nyan-stars.s3 { top: 0px; right: -60px; animation-delay: 0.15s; }

            @keyframes star-twinkle {
                from { opacity: 0.2; transform: scale(0.7); }
                to   { opacity: 1;   transform: scale(1.1); }
            }

            .nyan-loading-text {
                font-family: 'JetBrains Mono', monospace;
                font-size: 0.85em;
                color: #999;
                letter-spacing: 0.05em;
            }

            .nyan-dots::after {
                content: '';
                animation: dots 1.2s steps(4) infinite;
            }

            @keyframes dots {
                0%   { content: ''; }
                25%  { content: '.'; }
                50%  { content: '..'; }
                75%  { content: '...'; }
                100% { content: ''; }
            }
        </style>
    </head>
    <body>
        <div id="loading-overlay">
            <div class="nyan-scene">
                <div class="nyan-rainbow">
                    <span></span><span></span><span></span>
                    <span></span><span></span><span></span>
                </div>
                <div class="nyan-body">

                    <span class="nyan-stars s1">✦</span>
                    <span class="nyan-stars s2">✧</span>
                    <span class="nyan-stars s3">✦</span>
                </div>
            </div>
            <div class="nyan-loading-text">loading benchmarks<span class="nyan-dots"></span></div>
        </div>
        <div class="container">
            <header style="text-align: center;">
                <h1>enzyme</h1>
                <p>Commit: <a href="https://github.com/hpsc-lab/BenchmarkExplorer.jl/commit/76b9fe550e727c84ad79adf8496c1e1195389740" target="_blank" style="color: #666; text-decoration: none;">76b9fe5</a></p>
                
            </header>

            <div class="stats-panel" id="stats-panel"></div>

            <div class="controls">
                <a href="index.html" class="btn btn-secondary" style="text-decoration:none;flex-shrink:0;">← Back</a>
                <span style="font-weight:700;font-size:0.95em;margin-right:4px;flex-shrink:0;">enzyme</span>
                <button class="btn btn-primary" id="btn-percentage">% Change</button>
                <button class="btn btn-secondary" id="btn-dark">🌙 Dark</button>
                <button class="btn btn-secondary" id="btn-compact">⊞ Compact</button>
                <button class="btn btn-secondary" id="btn-heatmap">⊟ Heatmap</button>
                <button class="btn btn-secondary" id="btn-compare">⇄ Compare</button>
                <button class="btn btn-secondary" id="btn-reset-zoom">🔍 Reset Zoom</button>
                <button class="btn btn-secondary" id="btn-export">📥 CSV</button>
                
                <button class="btn" id="btn-shortcuts" title="Keyboard shortcuts" style="padding:8px 12px;">?</button>
                <div style="display:flex;gap:0;border:2px solid #191919;border-radius:8px;overflow:hidden;flex-shrink:0;">
                    <button class="btn range-btn" data-range="10" style="border:none;border-radius:0;padding:8px 11px;">10</button>
                    <button class="btn range-btn" data-range="25" style="border:none;border-radius:0;border-left:1px solid #ccc;padding:8px 11px;">25</button>

                    if (entry.__leaf) {
                        const { name, data } = entry.__leaf;
                        const stats = data.stats;
                        const item = document.createElement('div');
                        item.className = `benchmark-item trend-${stats.trend}`;

                        let trendBadge = '';
                        if (stats.num_runs > 1) {
                            const arrow = stats.trend === 'faster' ? '↓' : (stats.trend === 'slower' ? '↑' : '→');
                            const sign = stats.percent_change > 0 ? '+' : '';
                            trendBadge = `<span class="trend-badge trend-${stats.trend}">${arrow} ${sign}${stats.percent_change}%</span>`;
                        }

                        const plotId = 'plot-' + name.replace(/[^a-zA-Z0-9]/g, '-');
                        const anchorId = 'bench-' + name.replace(/[^a-zA-Z0-9]/g, '-');
                        item.id = anchorId;
                        const ratioBadge = stats.source_type === 'report_md' ? '<span class="trend-badge trend-stable" style="font-size:0.7em;opacity:0.7">ratio</span>' : '';
                        const sparkSvg = sparklineSVG(data.mean.y_raw || data.mean.y, 80, 28);
                        const searchTerm = document.getElementById('search').value;
                        const highlightedKey = highlightText(key, searchTerm);

                        const itemIdx = container.querySelectorAll('.benchmark-item').length;
                        item.style.animationDelay = Math.min(itemIdx * 0.04, 0.5) + 's';

                        item.innerHTML = `
                            <div class="benchmark-header" style="cursor:pointer" title="Click to toggle chart">
                                <div class="benchmark-name">
                                    <button class="anchor-btn" onclick="event.stopPropagation();navigator.clipboard.writeText(location.href.split('#')[0]+'#${anchorId}').catch(()=>{})" title="Copy link">#</button>
                                    <span>${highlightedKey}</span>
                                    ${trendBadge}
                                    ${ratioBadge}
                                    ${sparkSvg}
                                </div>
                                <div class="benchmark-stats">
                                    <div class="stat">
                                        <span class="stat-key">Latest</span>
                                        <span class="stat-val">${stats.latest_mean} ms</span>
                                    </div>
                                    <div class="stat">
                                        <span class="stat-key">Commit</span>
                                        <span class="stat-val"><a href="${commitBaseUrl}/commit/${stats.latest_commit}" target="_blank" style="color: inherit; text-decoration: underline;">${stats.latest_commit.substring(0, 7)}</a></span>
                                    </div>
                                    ${stats.julia_version ? `<div class="stat"><span class="stat-key">Julia</span><span class="stat-val">${stats.julia_version}</span></div>` : ''}
                                    <div class="stat">
                                        <span class="stat-key">Memory</span>
                                        <span class="stat-val">${formatBytes(stats.latest_memory)}</span>
                                    </div>
                                    <div class="stat">
                                        <span class="stat-key">Allocs</span>
                                        <span class="stat-val">${stats.latest_allocs}</span>
                                    </div>
                                    <div class="stat">
                                        <span class="stat-key">Runs</span>
                                        <span class="stat-val">${stats.num_runs}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="plot-container" id="${plotId}" data-benchmark-name="${name}">
                                <div class="skeleton-chart">
                                    <div class="skeleton-bar" style="height:30px"></div>
                                    <div class="skeleton-bar" style="height:20px"></div>
                                    <div class="skeleton-bar" style="height:50px"></div>
                                    <div class="skeleton-bar" style="height:35px"></div>
                                    <div class="skeleton-bar" style="height:60px"></div>
                                    <div class="skeleton-bar" style="height:25px"></div>
                                    <div class="skeleton-bar" style="height:45px"></div>
                                    <div class="skeleton-bar" style="height:40px"></div>
                                </div>
                            </div>
                        `;
                        container.appendChild(item);
                        item.querySelector('.benchmark-header').addEventListener('click', function(e) {
                            if (e.target.closest('.anchor-btn') || e.target.tagName === 'A') return;
                            const plotCont = item.querySelector('.plot-container');
                            const nowHidden = plotCont.style.display === 'none';
                            plotCont.style.display = nowHidden ? '' : 'none';
                            if (nowHidden) {
                                hiddenPlots.delete(name);
                                const pid = plotCont.id;
                                const bname = plotCont.dataset.benchmarkName;
                                if (bname && benchmarksData[bname] && !renderedPlots.has(pid)) {
                                    renderSinglePlot(bname, benchmarksData[bname], pid);
                                }
                            } else {
                                hiddenPlots.add(name);
                            }
                        });
                        if (hiddenPlots.has(name)) {
                            item.querySelector('.plot-container').style.display = 'none';
                        }
                        if (plotObserver) {
                            plotObserver.observe(item.querySelector('.plot-container'));
                        }
                    }
                    if (entry.__children) {
                        const folderPath = pathPrefix ? pathPrefix + '/' + key : key;
                        const leafCount = countLeaves(entry.__children) + (entry.__leaf ? 1 : 0);
                        const treeNode = document.createElement('div');
                        treeNode.className = depth === 0 ? 'tree-node root' : 'tree-node';

                        const toggle = document.createElement('div');
                        const isFirstAtRoot = firstFolder && depth === 0;
                        const isOpen = folderStates.has(folderPath) ? folderStates.get(folderPath) : isFirstAtRoot;
                        toggle.className = 'tree-toggle';
                        toggle.style.paddingLeft = `${24 + depth * 32}px`;
                        const { faster: tf, slower: ts } = countTrends(entry.__children);
                        const trendChips = [
                            tf > 0 ? `<span style="color:#27ae60;font-weight:400;font-size:0.75em;">↓${tf}</span>` : '',
                            ts > 0 ? `<span style="color:#e74c3c;font-weight:400;font-size:0.75em;">↑${ts}</span>` : ''
                        ].filter(Boolean).join(' ');
                        toggle.innerHTML = `<span class="toggle-icon">${isOpen ? '−' : '+'}</span> ${key} ${trendChips} <span class="count">${leafCount} benchmarks</span>`;

                        const children = document.createElement('div');
                        children.className = isOpen ? 'tree-children open' : 'tree-children';

                        toggle.addEventListener('click', function() {
                            const nowOpen = children.classList.toggle('open');
                            folderStates.set(folderPath, nowOpen);
                            this.querySelector('.toggle-icon').textContent = nowOpen ? '−' : '+';
                            if (nowOpen) renderVisiblePlots();
                        });

                        renderTreeNode(entry.__children, children, depth + 1, folderPath);

                        treeNode.appendChild(toggle);
                        treeNode.appendChild(children);
                        container.appendChild(treeNode);
                        firstFolder = false;
                    }

            let heatmapMode = false;
            let compareMode = false;
            let compareCommitA = null, compareCommitB = null;

            function renderBenchmarks(filter = '') {
                if (heatmapMode) { renderHeatmap(filter); return; }
                if (compareMode) { renderComparisonPanel(); return; }
                const container = document.getElementById('benchmarks-container');
                container.innerHTML = '';
                renderedPlots.clear();
                renderedPlotCount = 0;
                initPlotObserver();

                const filtered = Object.entries(benchmarksData)
                    .filter(([name, data]) => {
                        const matchesSearch = name.toLowerCase().includes(filter.toLowerCase());
                        const matchesTrend = trendFilter === 'all' || data.stats.trend === trendFilter;
                        return matchesSearch && matchesTrend;
                    })
                    .sort(([a], [b]) => a.localeCompare(b));

                if (filtered.length === 0) {
                    container.innerHTML = '<div class="no-results"><h2>No benchmarks found</h2><p>Try a different search term</p></div>';
                    return;
                }

                const tree = buildTree(filtered);
                renderTreeNode(tree, container, 0);
                totalPlots = container.querySelectorAll('.plot-container').length;
                updateProgress();
                renderVisiblePlots();
            }

            function calcPercentFromPrev(values) {
                return values.map((v, i) => {
                    if (i === 0) return 0;
                    const prev = values[i - 1];
                    if (prev === 0) return 0;
                    return ((v / prev) - 1) * 100;
                });
            }

            function updatePercentageMode() {
                Object.entries(benchmarksData).forEach(([name, data]) => {
                    const plotId = 'plot-' + name.replace(/[^a-zA-Z0-9]/g, '-');
                    const plotDiv = document.getElementById(plotId);
                    if (!plotDiv || !plotDiv.data) return;

                    const currentVisibility = plotDiv.data.map(trace => trace.visible);

                    const rawMean = data.mean.y_raw || data.mean.y;
                    const rawMin = data.min.y_raw || data.min.y;
                    const rawMedian = data.median.y_raw || data.median.y;

                    const newMeanY = percentageMode ? calcPercentFromPrev(rawMean) : rawMean;
                    const newMinY = percentageMode ? calcPercentFromPrev(rawMin) : rawMin;
                    const newMedianY = percentageMode ? calcPercentFromPrev(rawMedian) : rawMedian;

                    const meanHoverTexts = percentageMode ?
                        data.mean.commit_hashes.map((hash, i) =>
                            `Commit: ${hash}<br>Change: ${newMeanY[i].toFixed(2)}%<br>Original: ${rawMean[i].toFixed(3)} ms<br>Date: ${formatDate(data.mean.timestamps[i])}`
                        ) : data.mean.hovertext;

                    const errorUpdate = percentageMode ?
                        {'error_y.visible': false} :
                        (data.mean.error_y ? {'error_y.visible': true} : {});

                    Plotly.restyle(plotDiv, Object.assign({y: [newMeanY], hovertext: [meanHoverTexts]}, errorUpdate), [0]);
                    Plotly.restyle(plotDiv, {
                        y: [newMinY],
                        hovertemplate: percentageMode ?
                            'Commit: %{x}<br>Min: %{y:.2f}%<extra></extra>' :
                            'Commit: %{x}<br>Min: %{y:.3f} ms<extra></extra>'
                    }, [1]);
                    Plotly.restyle(plotDiv, {
                        y: [newMedianY],
                        hovertemplate: percentageMode ?
                            'Commit: %{x}<br>Median: %{y:.2f}%<extra></extra>' :
                            'Commit: %{x}<br>Median: %{y:.3f} ms<extra></extra>'
                    }, [2]);
                    Plotly.restyle(plotDiv, {visible: currentVisibility}, [0, 1, 2]);
                    Plotly.relayout(plotDiv, {
                        'yaxis.title': percentageMode ? 'Δ %' : 'ms',
                        'yaxis.autorange': true
                    });
                });
            }

            document.getElementById('btn-percentage').addEventListener('click', function() {
                percentageMode = !percentageMode;
                this.classList.toggle('active');
                updatePercentageMode();
            });

            document.getElementById('btn-dark').addEventListener('click', function() {
                darkMode = !darkMode;
                document.body.classList.toggle('dark-mode');
                this.classList.toggle('active');
                localStorage.setItem('darkMode', darkMode);
                updatePlotColors();
                if (heatmapMode) renderBenchmarks(document.getElementById('search').value);
            });

            function updatePlotColors() {
                const lineColor = darkMode ? '#ffffff' : '#191919';
                Object.entries(benchmarksData).forEach(([name]) => {
                    const plotId = 'plot-' + name.replace(/[^a-zA-Z0-9]/g, '-');
                    const plotDiv = document.getElementById(plotId);
                    if (plotDiv && plotDiv.data) {
                        Plotly.restyle(plotDiv, {'line.color': lineColor, 'marker.color': lineColor}, [0]);
                        Plotly.relayout(plotDiv, {
                            'plot_bgcolor': darkMode ? '#2a2a2a' : '#ffffff',
                            'paper_bgcolor': darkMode ? '#2a2a2a' : '#ffffff',
                            'font.color': darkMode ? '#e9e9e7' : '#191919'
                        });
                    }
                });
            }

            if (localStorage.getItem('darkMode') === 'true') {
                darkMode = true;
                document.body.classList.add('dark-mode');
                document.getElementById('btn-dark').classList.add('active');
            }

            if ('enzyme'.startsWith('nanosoldier') || 'enzyme'.startsWith('ns_')) {
                heatmapMode = true;
                document.getElementById('btn-heatmap').classList.add('active');
            }

            document.getElementById('search').addEventListener('input', function(e) {
                renderBenchmarks(e.target.value);
            });

            document.getElementById('trend-filter').addEventListener('change', function(e) {
                trendFilter = e.target.value;
                renderBenchmarks(document.getElementById('search').value);
            });

            document.querySelectorAll('.range-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const val = this.dataset.range;
                    maxRuns = val === 'all' ? null : parseInt(val);
                    renderedPlots.clear();
                    renderBenchmarks(document.getElementById('search').value);
                });

            document.getElementById('btn-reset-zoom').addEventListener('click', function() {
                Object.entries(benchmarksData).forEach(([name]) => {
                    const plotId = 'plot-' + name.replace(/[^a-zA-Z0-9]/g, '-');
                    const plotDiv = document.getElementById(plotId);
                    if (plotDiv && plotDiv.data) {

                            'xaxis.autorange': true,
                            'yaxis.autorange': true
                        });
                    }
                });
            });

            document.getElementById('btn-export').addEventListener('click', function() {
                let csv = 'Benchmark,Run,Timestamp,Mean (ms),Min (ms),Median (ms),Memory (bytes),Allocations\n';

                Object.entries(benchmarksData).forEach(([name, data]) => {
                    data.mean.x.forEach((run, i) => {
                        const timestamp = data.mean.timestamps[i] || '';
                        csv += `"${name}",${run},${timestamp},${data.mean.y[i]},${data.min.y[i]},${data.median.y[i]},${data.stats.latest_memory},${data.stats.latest_allocs}\n`;
                    });
                });

                const blob = new Blob([csv], {type: 'text/csv'});
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'enzyme-benchmarks.csv';
                a.click();
            });

            

            function showDetailPage(benchName, data, idx) {

                const rawMin = data.min.y_raw || data.min.y;
                const rawMedian = data.median.y_raw || data.median.y;

                const html = '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>' + benchName + '</title><style>' + css + '</style></head><body>' +

                    '<tr><th>Date</th><td>' + formatDate(timestamp) + '</td></tr>' +

                    '<tr><th>Median</th><td>' + fmt(medianVal) + '</td></tr>' +

                    (errVal > 0 ? '<tr><th>Std Dev</th><td>' + fmt(errVal) + '</td></tr>' : '') +

            function renderHeatmap(filter = '') {
                const container = document.getElementById('benchmarks-container');
                container.innerHTML = '';
                const benchmarks = Object.entries(benchmarksData)
                    .filter(([name, data]) => {
                        const matchesSearch = name.toLowerCase().includes(filter.toLowerCase());
                        const matchesTrend = trendFilter === 'all' || data.stats.trend === trendFilter;
                        return matchesSearch && matchesTrend;
                    }).sort(([a], [b]) => a.localeCompare(b));
                if (!benchmarks.length) { container.innerHTML = '<div class="no-results"><h2>No benchmarks</h2></div>'; return; }

                const commitSet = new Map(); // hash → timestamp
                benchmarks.forEach(([, data]) => {
                    data.mean.commit_hashes.forEach((h, i) => {
                        if (!commitSet.has(h)) commitSet.set(h, data.mean.timestamps[i] || '');
                    });
                });
                const commits = [...commitSet.entries()]
                    .sort((a, b) => a[1].localeCompare(b[1]))
                    .slice(-25).map(([h]) => h);
                const shortCommits = commits.map(h => h.substring(0, 7));

                const wrap = document.createElement('div');
                wrap.className = 'heatmap-wrap';
                const table = document.createElement('table');
                table.className = 'heatmap-table';
                const headerRow = `<thead><tr><th class="heatmap-name">Benchmark</th>${shortCommits.map(c =>
                    `<th style="writing-mode:vertical-rl;transform:rotate(180deg);font-weight:400;padding:4px 6px;font-size:0.72em;">${c}</th>`).join('')}</tr></thead>`;
                table.innerHTML = headerRow;

                const tbody = document.createElement('tbody');
                benchmarks.forEach(([name, data]) => {
                    const commitMap = {};
                    data.mean.commit_hashes.forEach((h, i) => { commitMap[h] = data.mean.y[i]; });
                    const vals = commits.map(h => commitMap[h] !== undefined ? commitMap[h] : null);
                    const baseline = vals.find(v => v !== null) || 1;
                    const shortName = name.split('/').slice(-2).join('/');
                    const row = document.createElement('tr');
                    const cells = commits.map((h, i) => {
                        const v = vals[i];
                        if (v === null) return `<td style="background:${darkMode?'#383838':'#f0f0ee'};width:38px"></td>`;
                        const ratio = v / baseline;
                        const pct = ((ratio - 1) * 100).toFixed(0);
                        const sat = Math.min(Math.abs(ratio - 1) * 400, 80);
                        const hue = ratio <= 1 ? 140 : 0;
                        const lt = darkMode ? (25 + sat * 0.4) : (96 - sat * 0.45);
                        const textColor = darkMode ? `hsl(${hue},70%,${60 + sat * 0.3}%)` : `hsl(${hue},${Math.min(sat*2,100)}%,${Math.max(30, 40 - sat * 0.3)}%)`;
                        const bg = `hsl(${hue},${sat}%,${lt}%)`;
                        const label = Math.abs(+pct) > 3 ? (pct > 0 ? '+' : '') + pct + '%' : '';
                        return `<td style="background:${bg};color:${textColor};width:38px;cursor:pointer" title="${name}\n${h.substring(0,7)}: ${v.toFixed(3)}ms (${pct > 0 ? '+' : ''}${pct}%)" onclick="scrollToPlot('${name}')">${label}</td>`;
                    }).join('');
                    row.innerHTML = `<td class="heatmap-name" title="${name}">${shortName}</td>${cells}`;
                    tbody.appendChild(row);
                });
                table.appendChild(tbody);
                wrap.appendChild(table);
                container.appendChild(wrap);
            }

            function getAllCommits() {
                const seen = new Map();
                Object.values(benchmarksData).forEach(data => {
                    data.mean.commit_hashes.forEach((h, i) => {
                        if (!seen.has(h)) seen.set(h, data.mean.timestamps[i] || '');
                    });
                });
                return [...seen.entries()].sort((a, b) => a[1].localeCompare(b[1])).map(([h]) => h);
            }

            function renderComparisonPanel() {
                const container = document.getElementById('benchmarks-container');
                container.innerHTML = '';
                const panel = document.getElementById('comparison-panel');
                panel.style.display = '';
                const allCommits = getAllCommits();
                const optionsA = allCommits.map(h =>
                    `<option value="${h}" ${h===compareCommitA?'selected':''}>${h.substring(0,7)}</option>`).join('');
                const optionsB = allCommits.map(h =>
                    `<option value="${h}" ${h===compareCommitB?'selected':''}>${h.substring(0,7)}</option>`).join('');

                let tableHtml = '';
                if (compareCommitA && compareCommitB && compareCommitA !== compareCommitB) {
                    const rows = [];
                    Object.entries(benchmarksData).forEach(([name, data]) => {
                        const idxA = data.mean.commit_hashes.indexOf(compareCommitA);
                        const idxB = data.mean.commit_hashes.indexOf(compareCommitB);
                        if (idxA < 0 || idxB < 0) return;
                        const valA = data.mean.y[idxA], valB = data.mean.y[idxB];
                        rows.push({ name, valA, valB, change: ((valB / valA) - 1) * 100 });
                    });
                    rows.sort((a, b) => b.change - a.change);
                    const shortA = compareCommitA.substring(0, 7);
                    const shortB = compareCommitB.substring(0, 7);
                    const allCmpVals = rows.flatMap(r => [r.valA, r.valB]);
                    const { label: cUnit, factor: cFactor } = autoUnit(allCmpVals);
                    const fmtC = v => (v * cFactor).toFixed(3) + ' ' + cUnit;
                    tableHtml = `<table class="comparison-table">
                        <thead><tr><th>Benchmark</th><th>${shortA}</th><th>${shortB}</th><th>Change</th></tr></thead>
                        <tbody>${rows.map(r => {
                            const c = r.change < -5 ? '#27ae60' : r.change > 5 ? '#e74c3c' : '#787774';
                            const sign = r.change > 0 ? '+' : '';
                            return `<tr><td style="font-family:monospace;font-size:0.85em">${r.name}</td><td>${fmtC(r.valA)}</td><td>${fmtC(r.valB)}</td><td style="color:${c};font-weight:600">${sign}${r.change.toFixed(1)}%</td></tr>`;
                        }).join('')}</tbody></table>`;
                } else if (compareCommitA && compareCommitB) {
                    tableHtml = '<p style="color:#999;padding:16px 0">Select two different commits to compare.</p>';
                }

                panel.innerHTML = `<div style="display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap;margin-top:5px;">
                    <select id="cmp-a" class="search-box" style="flex:0;min-width:200px;"><option value="">Commit A...</option>${optionsA}</select>
                    <span style="font-size:0.85em;color:#999">vs</span>
                    <select id="cmp-b" class="search-box" style="flex:0;min-width:200px;"><option value="">Commit B...</option>${optionsB}</select>
                    <button class="btn btn-primary" id="btn-run-compare">Compare</button>
                </div>${tableHtml}`;

                document.getElementById('cmp-a').addEventListener('change', e => { compareCommitA = e.target.value || null; });
                document.getElementById('cmp-b').addEventListener('change', e => { compareCommitB = e.target.value || null; });
                document.getElementById('btn-run-compare').addEventListener('click', () => renderComparisonPanel());
            }

            document.getElementById('btn-compact').addEventListener('click', function() {
                heatmapMode = false; compareMode = false;
                document.getElementById('btn-heatmap').classList.remove('active');
                document.getElementById('btn-compare').classList.remove('active');
                const isCompact = document.body.classList.toggle('compact-mode');
                this.classList.toggle('active', isCompact);
                if (!isCompact) renderVisiblePlots();
            });

            document.getElementById('btn-heatmap').addEventListener('click', function() {
                compareMode = false;
                document.getElementById('btn-compare').classList.remove('active');
                document.getElementById('comparison-panel').style.display = 'none';
                heatmapMode = !heatmapMode;
                this.classList.toggle('active', heatmapMode);
                renderBenchmarks(document.getElementById('search').value);
            });

            document.getElementById('btn-compare').addEventListener('click', function() {
                heatmapMode = false;
                document.getElementById('btn-heatmap').classList.remove('active');
                compareMode = !compareMode;
                this.classList.toggle('active', compareMode);
                if (!compareMode) {
                    document.getElementById('comparison-panel').style.display = 'none';
                    renderBenchmarks(document.getElementById('search').value);
                } else {
                    renderBenchmarks(document.getElementById('search').value);
                }
            });

            document.getElementById('btn-shortcuts').addEventListener('click', function() {
                document.getElementById('shortcuts-modal').classList.add('open');
            });

            document.addEventListener('keydown', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') {
                    if (e.key === 'Escape') e.target.blur();
                    return;
                }
                switch (e.key) {
                    case '/': e.preventDefault(); document.getElementById('search').focus(); break;
                    case 'd': case 'D': document.getElementById('btn-dark').click(); break;
                    case 'c': case 'C': document.getElementById('btn-compact').click(); break;
                    case 'h': case 'H': document.getElementById('btn-heatmap').click(); break;
                    case 'v': case 'V': document.getElementById('btn-compare').click(); break;
                    case 'r': case 'R': document.getElementById('btn-reset-zoom').click(); break;
                    case '?': document.getElementById('shortcuts-modal').classList.toggle('open'); break;
                    case 'Escape': document.getElementById('shortcuts-modal').classList.remove('open'); break;
                }
            });

            renderStats();
            renderBenchmarks();
            document.getElementById('loading-overlay').classList.add('hidden');
        </script>

        <div class="shortcuts-modal" id="shortcuts-modal" onclick="if(event.target===this)this.classList.remove('open')">
            <div class="shortcuts-box">
                <h3>Keyboard Shortcuts</h3>
                <div class="shortcut-row"><span>Focus search</span><kbd>/</kbd></div>
                <div class="shortcut-row"><span>Toggle dark mode</span><kbd>D</kbd></div>
                <div class="shortcut-row"><span>Compact view</span><kbd>C</kbd></div>
                <div class="shortcut-row"><span>Heatmap view</span><kbd>H</kbd></div>
                <div class="shortcut-row"><span>Compare commits</span><kbd>V</kbd></div>
                <div class="shortcut-row"><span>Reset zoom</span><kbd>R</kbd></div>
                <div class="shortcut-row"><span>This panel</span><kbd>?</kbd></div>
                <div class="shortcut-row"><span>Close</span><kbd>Esc</kbd></div>
                <button class="btn" onclick="document.getElementById('shortcuts-modal').classList.remove('open')" style="margin-top:18px;width:100%">Close</button>
            </div>
        </div>
    </body>
    </html>
